 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEMI MASTER v10 | PRO BUSINESS SUITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #f43f5e;
            --dark: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--dark); overflow-x: hidden; }

        #mainLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
            backdrop-filter: blur(5px);
        }
        .spinner { width: 60px; height: 60px; border: 6px solid #1e293b; border-top: 6px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 280px; }
        .toast { background: white; border-left: 5px solid var(--primary); padding: 15px 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-weight: 600; font-size: 14px; animation: slideInRight 0.3s ease-out forwards; display: flex; align-items: center; gap: 10px; }
        .toast.error { border-color: var(--secondary); }
        .toast.success { border-color: var(--accent); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* ============================================================
           OTP OVERLAY - TELEGRAM VERIFICATION SYSTEM
           ============================================================ */
        #otpOverlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(10px);
            z-index: 99999;
            display: flex;
            align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }
        .otp-card {
            background: white; border-radius: 32px; padding: 40px 30px;
            max-width: 440px; width: 100%; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 2px solid var(--primary);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .otp-icon-circle {
            width: 75px; height: 75px; border-radius: 50%;
            background: linear-gradient(135deg, var(--dark), #1e293b);
            display: inline-flex; align-items: center; justify-content: center;
            border: 3px solid var(--primary); margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(79,70,229,0.3);
        }
        .otp-icon-circle i { font-size: 32px; color: var(--primary); }
        .otp-card h2 { margin: 0 0 6px 0; font-size: 24px; font-weight: 800; color: var(--dark); }
        .otp-card .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }
        .otp-input-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        .otp-box {
            width: 60px; height: 70px; border-radius: 16px;
            border: 2px solid #e2e8f0; background: #f8fafc;
            text-align: center; font-size: 30px; font-weight: 800;
            color: var(--dark); font-family: 'Courier New', monospace;
            outline: none; transition: all 0.3s;
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
        }
        .otp-box:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 5px rgba(79,70,229,0.1); transform: translateY(-3px); }
        .otp-box.filled { border-color: var(--accent); background: #f0fdf4; }
        .btn-verify {
            width: 100%; padding: 18px; background: var(--dark);
            color: white; border: 2px solid var(--primary); border-radius: 18px;
            font-size: 17px; font-weight: 800; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 8px; margin-bottom: 12px;
        }
        .btn-verify:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 25px rgba(79,70,229,0.3); }
        .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-resend {
            width: 100%; padding: 14px; background: transparent;
            color: var(--dark); border: 2px solid #e2e8f0; border-radius: 18px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-resend:hover { border-color: var(--primary); background: #f8fafc; }
        .otp-msg { margin-top: 15px; font-size: 13px; font-weight: 600; min-height: 20px; }

        /* ============================================================
           ORIGINAL ADMIN STYLES
           ============================================================ */

        .active-section { display: block; }

        .card { background: white; border-radius: 28px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tag { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; padding-left: 5px; }

        .input-grid { display: grid; gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        input, textarea, select { background: #f1f5f9; border: 2px solid transparent; padding: 14px; border-radius: 16px; font-size: 15px; transition: 0.3s; color: var(--dark); font-weight: 500; -webkit-appearance: none; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        .search-bar { width: 100%; padding: 15px 20px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 15px; margin-bottom: 20px; outline: none; transition: 0.3s; background: white; }
        .search-bar:focus { border-color: var(--primary); }

        .photo-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .photo-row { display: flex; gap: 10px; align-items: center; background: #f8fafc; padding: 10px; border-radius: 16px; border: 1px dashed #cbd5e1; }
        .photo-row input { flex: 1; padding: 8px; background: transparent; border: none; font-size: 12px; }
        .btn-add-photo { background: #e0e7ff; color: var(--primary); border: none; padding: 12px; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 5px; transition: 0.2s; width: 100%; }

        .btn-main { background: var(--dark); color: white; width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 18px; font-weight: 800; margin-top: 15px; cursor: pointer; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.3); transition: 0.3s; }
        .btn-main:active { transform: translateY(2px); background: #000; }

        .hist-card { background: white; border-radius: 22px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); align-items: flex-start; transition: 0.3s; position: relative; }
        .hist-card img { width: 85px; height: 85px; border-radius: 15px; object-fit: cover; background: #f1f5f9; flex-shrink: 0; }
        .hist-details { flex: 1; min-width: 0; }
        .hist-details h4 { margin: 0 0 5px 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-top: 8px; text-transform: uppercase; }
        .in-stock { background: #dcfce7; color: #166534; }

        .limited-stock { background: #fef9c3; color: #854d0e; }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 5px; margin-top: 12px; }
        .btn-icon { background: #f1f5f9; border: none; padding: 10px 5px; border-radius: 10px; cursor: pointer; font-size: 12px; transition: 0.2s; font-weight: 700; color: var(--dark); text-align: center; }
        .btn-icon.edit { background: #e0e7ff; color: var(--primary); }
        .btn-icon.del { background: #ffe4e6; color: var(--secondary); }

        #editModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.8); z-index: 3000; display: none; justify-content: center; align-items: flex-end; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 20px; font-weight: 800; }
        .close-modal { background: #f1f5f9; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; }

        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0 20px; border-top: 1px solid #eee; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .nav-link { text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 700; text-align: center; flex: 1; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 2px; font-style: normal; }
        
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); text-align: center; }
        .stat-box h3 { margin: 0; font-size: 20px; color: var(--primary); font-weight: 800; }
        .stat-box p { margin: 5px 0 0; font-size: 9px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }

        .premium-check { display: flex; align-items: center; gap: 12px; padding: 16px; background: #f8fafc; border-radius: 16px; border: 1px dashed #cbd5e1; }
        .premium-check input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--primary); cursor: pointer; }
        .premium-check label { font-size: 14px; font-weight: 700; color: var(--dark); cursor: pointer; }
    </style>
</head>

<!-- OTP VERIFICATION JAVASCRIPT -->
<!-- ============================================================ -->
<script>
    // ============================================================
    // TELEGRAM BOT CONFIGURATION
    // ============================================================
    const TELEGRAM_BOT_TOKEN = "8910407538:AAHgKCWqX1mcwmDuyze23mItDdJC2ZnPT1c";
    const TELEGRAM_CHAT_ID = "-1003929347542";
    
    // ============================================================
    // OTP STATE (Hash stored - inspect-safe)
    // ============================================================
    let otpHash = null;           // SHA-256 hash of the OTP (actual OTP never stored)
    let otpExpiryTime = null;    // When OTP expires (5 minutes)
    let isOtpRequesting = false; // Prevent multiple simultaneous requests
    
    // ============================================================
    // HASH FUNCTION (SHA-256 via SubtleCrypto)
    // ============================================================
    async function hashOTP(otp) {
        const msgBuffer = new TextEncoder().encode(otp + 'NEMI_ADMIN_SALT_2026_SECURE');
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // ============================================================
    // SEND OTP TO TELEGRAM GROUP
    // ============================================================
    async function sendOTPToTelegram(otp) {
        const message = `🔐 *NEMI MART ADMIN OTP*\n\n🎯 *OTP:* \`${otp}\`\n\n⏰ *Valid for:* 5 minutes\n📅 *Requested:* ${new Date().toLocaleString()}\n\n_Safeguard this OTP. Do not share._`;
        
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
        
        const result = await response.json();
        if (!result.ok) {
            throw new Error(result.description || 'Failed to send OTP');
        }
        return result;
    }
    
    // ============================================================
    // GENERATE & SEND NEW OTP
    // ============================================================
    async function requestNewOTP() {
        if (isOtpRequesting) return;
        
        const msgEl = document.getElementById('otpMsg');
        const resendBtn = document.getElementById('resendBtn');
        
        isOtpRequesting = true;
        resendBtn.disabled = true;
        msgEl.innerHTML = '<span style="color:#4f46e5;">📤 Sending OTP to Telegram...</span>';
        
        try {
            // Generate random 4-digit OTP
            const otp = String(Math.floor(1000 + Math.random() * 9000));
            
            // Send to Telegram
            await sendOTPToTelegram(otp);
            
            // Hash the OTP and store (actual OTP cleared from memory)
            otpHash = await hashOTP(otp);
            otpExpiryTime = Date.now() + (5 * 60 * 1000); // 5 minutes
            
            msgEl.innerHTML = '<span style="color:#10b981;">✅ OTP sent! Check Telegram group.</span>';
            
            // Clear OTP input boxes
            document.querySelectorAll('.otp-box').forEach(box => box.value = '');
            document.querySelector('.otp-box').focus();
            
        } catch (error) {
            console.error('OTP Error:', error);
            msgEl.innerHTML = '<span style="color:#f43f5e;">❌ Failed to send OTP. Check bot token & chat ID.</span>';
        } finally {
            isOtpRequesting = false;
            resendBtn.disabled = false;
        }
    }
    
    // ============================================================
    // VERIFY ENTERED OTP
    // ============================================================
    async function verifyOTP() {
        const otpBoxes = document.querySelectorAll('.otp-box');
        const enteredOTP = Array.from(otpBoxes).map(box => box.value).join('');
        const msgEl = document.getElementById('otpMsg');
        const verifyBtn = document.getElementById('verifyBtn');
        
        // Validate input
        if (enteredOTP.length !== 4) {
            msgEl.innerHTML = '<span style="color:#EAB308;">⚠️ Please enter complete 4-digit OTP</span>';
            return;
        }
        
        // Check if OTP was requested
        if (!otpHash) {
            msgEl.innerHTML = '<span style="color:#EAB308;">⚠️ Request OTP first</span>';
            return;
        }
        
        // Check expiry (5 minutes)
        if (Date.now() > otpExpiryTime) {
            msgEl.innerHTML = '<span style="color:#f43f5e;">⏰ OTP expired. Request a new one.</span>';
            otpHash = null;
            otpExpiryTime = null;
            otpBoxes.forEach(box => box.value = '');
            return;
        }
        
        // Verify
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        
        try {
            const enteredHash = await hashOTP(enteredOTP);
            
            if (enteredHash === otpHash) {
                // ✅ SUCCESS
                msgEl.innerHTML = '<span style="color:#10b981;">✅ Access Granted! Loading admin panel...</span>';
                
                // Store session flag
                sessionStorage.setItem('nemi_admin_verified', 'true');
                sessionStorage.setItem('nemi_admin_verified_at', Date.now().toString());
                
                // Hide overlay and show admin content
                setTimeout(() => {
                    document.getElementById('otpOverlay').style.display = 'none';
                    document.getElementById('adminMainContent').style.display = 'block';
                }, 500);
                
            } else {
                // ❌ INVALID
                msgEl.innerHTML = '<span style="color:#f43f5e;">❌ Invalid OTP. Try again.</span>';
                otpBoxes.forEach(box => box.value = '');
                document.querySelector('.otp-box').focus();
            }
        } catch (error) {
            msgEl.innerHTML = '<span style="color:#f43f5e;">❌ Verification error. Try again.</span>';
        } finally {
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-lock"></i> Verify & Access';
        }
    }
    
    // ============================================================
    // OTP INPUT HANDLERS
    // ============================================================
    function otpAutoFocus(input, index) {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (input.value.length === 1) {
            input.classList.add('filled');
            const nextBox = document.querySelectorAll('.otp-box')[index + 1];
            if (nextBox) nextBox.focus();
        } else {
            input.classList.remove('filled');
        }
    }
    
    function otpBackspace(event, input, index) {
        if (event.key === 'Backspace' && !input.value && index > 0) {
            const prevBox = document.querySelectorAll('.otp-box')[index - 1];
            if (prevBox) { prevBox.value = ''; prevBox.classList.remove('filled'); prevBox.focus(); }
        }
    }
    
    // ============================================================
    // PASTE OTP SUPPORT
    // ============================================================
    document.addEventListener('paste', function(e) {
        const activeEl = document.activeElement;
        if (activeEl && activeEl.closest('#otpOverlay')) {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text');
            const digits = pasted.replace(/[^0-9]/g, '').slice(0, 4);
            if (digits.length === 4) {
                const boxes = document.querySelectorAll('.otp-box');
                digits.split('').forEach((d, i) => { boxes[i].value = d; boxes[i].classList.add('filled'); });
                boxes[3].focus();
            }
        }
    });
    
    // ============================================================
    // CHECK EXISTING SESSION ON LOAD
    // ============================================================
    (function checkSession() {
        const verified = sessionStorage.getItem('nemi_admin_verified');
        const verifiedAt = parseInt(sessionStorage.getItem('nemi_admin_verified_at') || '0');
        const sessionDuration = 30 * 60 * 1000; // 30 minutes session
        
        if (verified === 'true' && (Date.now() - verifiedAt) < sessionDuration) {
            // Already verified in this session
            document.getElementById('otpOverlay').style.display = 'none';
            document.getElementById('adminMainContent').style.display = 'block';
        } else {
            // Need OTP - auto request
            sessionStorage.removeItem('nemi_admin_verified');
            document.getElementById('adminMainContent').style.display = 'none';
            document.getElementById('otpOverlay').style.display = 'flex';
            
            // Auto-request OTP on load
            setTimeout(() => {
                requestNewOTP();
                document.querySelector('.otp-box').focus();
            }, 500);
        }
    })();
    
    // Expose functions globally
    window.requestNewOTP = requestNewOTP;
    window.verifyOTP = verifyOTP;
    window.otpAutoFocus = otpAutoFocus;
    window.otpBackspace = otpBackspace;
</script>

<!-- ORIGINAL ADMIN PANEL JAVASCRIPT -->
<!-- ============================================================ -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const CLOUD_NAME = "despxo7zb";
    const UPLOAD_PRESET = "nemi_preset"; 
    
    const firebaseConfig = { 
        databaseURL: "https://nemi-mart-2-default-rtdb.firebaseio.com" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let globalProducts = {};

    window.showToast = (msg, type = "success") => {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = type === 'success' ? `✅ ${msg}` : `⚠️ ${msg}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
    };

    window.showTab = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        if(el) el.classList.add('active');
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    window.addNewPhotoField = () => {
        const div = document.createElement('div');
        div.className = 'photo-row';
        div.innerHTML = `<input type="file" class="photo-input" accept="image/*"> <button type="button" class="btn-icon del" onclick="this.parentElement.remove()" style="padding:5px 10px">✕</button>`;
        document.getElementById('photoList').appendChild(div);
    };

    // Product Listener
    onValue(ref(db, 'products'), (snap) => {
        globalProducts = snap.val() || {};
        renderFeed(globalProducts);
    });

    // Form Submission Logic
    document.getElementById('proForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loader = document.getElementById('mainLoader');
        const progressText = document.getElementById('loadProgress');
        const fileInputs = document.querySelectorAll('.photo-input');
        
        loader.style.display = 'flex';
        let uploadedUrls = [];

        try {
            for(let i=0; i < fileInputs.length; i++) {
                let file = fileInputs[i].files[0];
                if(file) {
                    progressText.innerText = `Photo ${i+1}/${fileInputs.length} Uploading...`;
                    
                    let formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", UPLOAD_PRESET);
                    
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                        method: "POST",
                        body: formData
                    });
                    
                    const cloudData = await res.json();
                    if(cloudData.secure_url) uploadedUrls.push(cloudData.secure_url);
                }
            }

            if(uploadedUrls.length === 0) throw new Error("Please upload at least one photo!");

            progressText.innerText = `Saving to Firebase...`;

            const sCount = parseInt(document.getElementById('stockCount').value);
            const p = parseFloat(document.getElementById('price').value);
            const d = parseFloat(document.getElementById('disc').value);
            const final = Math.round(p - (p * (d/100)));
            const pTitle = document.getElementById('title').value;
            const isPremium = document.getElementById('isPremium').checked;

            const prodData = {
                title: pTitle,
                category: document.getElementById('category').value,
                price: p, discount: d, finalPrice: final,
                stock: sCount, 
                status: sCount <= 0 ? "OUTOFSTOCK" : (sCount < 5 ? "LIMITED" : "INSTOCK"),
                images: uploadedUrls,
                hero: document.getElementById('hero').value,
                description: document.getElementById('desc').value,
                usage: document.getElementById('usage').value,
                ingredients: document.getElementById('ing').value,
                isPremium: isPremium,
                time: Date.now()
            };

            const newProRef = push(ref(db, 'products'));
            await set(newProRef, prodData);

            const newNotifRef = push(ref(db, 'notifications'));
            await set(newNotifRef, {
                title: "New Product Available!",
                message: `${pTitle} has been added to the store at ₹${final}. Check it out now!`,
                type: "new",
                timestamp: Date.now()
            });

            showToast("Product & Notification Live!");
            document.getElementById('proForm').reset();
            document.getElementById('photoList').innerHTML = `<div class="photo-row"><input type="file" class="photo-input" accept="image/*" required></div>`;
            document.getElementById('isPremium').checked = false;
            showTab('listPage', document.querySelectorAll('.nav-link')[1]);

        } catch (err) {
            showToast(err.message, "error");
        } finally {
            loader.style.display = 'none';
        }
    });

    window.renderFeed = (dataObj) => {
        const feed = document.getElementById('masterFeed');
        feed.innerHTML = "";
        const keys = Object.keys(dataObj).reverse();
        
        document.getElementById('totalProducts').innerText = keys.length;
        document.getElementById('activeProducts').innerText = keys.filter(k => dataObj[k].stock > 0).length;

        if(keys.length === 0) {
            feed.innerHTML = `<div style="text-align:center; padding:50px; color:#94a3b8;">Empty Database</div>`;
            return;
        }

        keys.forEach(id => {
            const p = dataObj[id];
            const badgeClass = p.stock <= 0 ? 'out-stock' : (p.stock < 5 ? 'limited-stock' : 'in-stock');
            const badgeText = p.stock <= 0 ? 'OUT OF STOCK' : (p.stock < 5 ? `ONLY ${p.stock} LEFT` : 'IN STOCK');

            feed.innerHTML += `
                <div class="hist-card">
                    <img src="${p.images ? p.images[0] : ''}" alt="img">
                    <div class="hist-details">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span style="font-size:9px; color:var(--primary); font-weight:800">${p.category}</span>
                            <button class="btn-icon edit" onclick="openEdit('${id}')">EDIT</button>
                        </div>
                        <h4>${p.title} ${p.isPremium ? '🏆' : ''}</h4>
                        <div style="margin: 5px 0;">
                            <b style="font-size:16px;">₹${p.finalPrice}</b> 
                            <span style="text-decoration:line-through; font-size:12px; color:#94a3b8; margin-left:5px;">₹${p.price}</span>
                        </div>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                        <div class="action-btns">
                            <button class="btn-icon" onclick="quickStock('${id}', ${parseInt(p.stock) + 10})">+10</button>
                            <button class="btn-icon" onclick="quickStock('${id}', 0)">SET 0</button>
                            <button class="btn-icon del" onclick="delItem('${id}')">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        });
    };

    window.filterProducts = () => {
        const q = document.getElementById('searchBox').value.toLowerCase();
        const filtered = {};
        Object.keys(globalProducts).forEach(id => {
            const p = globalProducts[id];
            if(p.title.toLowerCase().includes(q) || p.category.toLowerCase().includes(q)) filtered[id] = p;
        });
        renderFeed(filtered);
    };

    window.quickStock = (id, num) => {
        const stat = num <= 0 ? "OUTOFSTOCK" : (num < 5 ? "LIMITED" : "INSTOCK");
        update(ref(db, `products/${id}`), { stock: num, status: stat })
            .then(() => showToast("Stock Updated!"))
            .catch(() => showToast("Error", "error"));
    };

    window.delItem = (id) => {
        if(confirm("Delete this product permanently?")) {
            remove(ref(db, `products/${id}`)).then(() => showToast("Deleted!"));
        }
    };

    window.openEdit = (id) => {
        const p = globalProducts[id];
        document.getElementById('editId').value = id;
        document.getElementById('editTitle').value = p.title;
        document.getElementById('editPrice').value = p.price;
        document.getElementById('editDisc').value = p.discount;
        document.getElementById('editStock').value = p.stock;
        document.getElementById('editModal').style.display = 'flex';
    };

    window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

    document.getElementById('editForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const pr = parseFloat(document.getElementById('editPrice').value);
        const ds = parseFloat(document.getElementById('editDisc').value);
        const st = parseInt(document.getElementById('editStock').value);
        
        update(ref(db, `products/${id}`), {
            title: document.getElementById('editTitle').value,
            price: pr, discount: ds, stock: st,
            finalPrice: Math.round(pr - (pr * (ds/100))),
            status: st <= 0 ? "OUTOFSTOCK" : (st < 5 ? "LIMITED" : "INSTOCK")
        }).then(() => {
            closeEditModal();
            showToast("Updated!");
        });
    });
</script>
