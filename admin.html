<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEMI COMMAND v13 | Order & User Master</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        /* ============================================================
           ROOT VARIABLES - GREEN/CREME/GOLD ADMIN THEME
           ============================================================ */
        :root {
            --primary: #1A3E26;
            --primary-dark: #0A1F13;
            --primary-light: #2D5A27;
            --pending: #fbbf24;
            --confirm: #10b981;
            --deliver: #3b82f6;
            --reject: #ef4444;
            --danger: #f43f5e;
            --dark: #0A1F13;
            --dark-light: #1A3E26;
            --card-bg: #ffffff;
            --body-bg: #FDFBF7;
            --text-muted: #5C6F63;
            --border-light: #EAE5D9;
            --gold: #D4AF37;
            --gold-light: #FAF4E5;
            
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
            --radius-sm: 12px;
            
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
            
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--body-bg);
            color: var(--dark);
            line-height: 1.5;
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--body-bg); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* ============================================================
           LOADER
           ============================================================ */
        #pageLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px); z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.5s;
        }
        .loader-spinner {
            width: 60px; height: 60px;
            border: 4px solid var(--gold-light); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            margin-top: 20px; font-weight: 700; color: var(--dark);
            letter-spacing: 2px; font-size: 14px;
        }

        /* ============================================================
           TOAST NOTIFICATIONS
           ============================================================ */
        #toastContainer {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            display: flex; flex-direction: column; gap: 10px; max-width: 320px;
        }
        .toast {
            background: var(--dark); color: white; padding: 16px 20px;
            border-radius: 16px; border-left: 5px solid var(--gold);
            box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease-out;
            display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 14px;
        }
        .toast.success { border-left-color: var(--confirm); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--primary); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ============================================================
           HEADER - PREMIUM GREEN
           ============================================================ */
        header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-light) 100%);
            padding: 25px 20px; color: white; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border-bottom: 3px solid var(--gold);
        }
        .logo-box h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
        .logo-box span { font-size: 10px; opacity: 0.7; text-transform: uppercase; display: block; letter-spacing: 2px; }
        .header-stats { display: flex; gap: 10px; }
        .live-stat {
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 30px;
            font-size: 12px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 6px;
        }
        .live-stat i { color: var(--gold); }

        /* ============================================================
           STATS DASHBOARD
           ============================================================ */
        .stats-dashboard {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 16px;
        }
        .stat-card {
            background: var(--card-bg); padding: 18px 16px; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
            display: flex; align-items: center; gap: 14px; transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .stat-icon {
            width: 50px; height: 50px; border-radius: 16px; display: flex;
            align-items: center; justify-content: center; font-size: 22px;
        }
        .stat-icon.orders { background: rgba(26, 62, 38, 0.15); color: var(--primary); }
        .stat-icon.revenue { background: rgba(16, 185, 129, 0.15); color: var(--confirm); }
        .stat-icon.users { background: rgba(59, 130, 246, 0.15); color: var(--deliver); }
        .stat-icon.products { background: rgba(212, 175, 55, 0.15); color: var(--gold); }
        .stat-content h3 { font-size: 24px; font-weight: 800; line-height: 1.2; }
        .stat-content p { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ============================================================
           TABS
           ============================================================ */
        .tab-container {
            display: flex; padding: 0 16px; gap: 5px;
            border-bottom: 1px solid var(--border-light); margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1; padding: 16px 10px; background: none; border: none;
            font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer;
            transition: var(--transition); border-radius: var(--radius-md) var(--radius-md) 0 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active {
            color: var(--primary); background: rgba(26, 62, 38, 0.08);
            border-bottom: 3px solid var(--gold);
        }
        .tab-btn i { font-size: 16px; }

        /* ============================================================
           CONTENT SECTIONS
           ============================================================ */
        .content-section { display: none; padding: 0 16px 20px; animation: fadeIn 0.4s ease-out; }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================
           FILTER BAR
           ============================================================ */
        .filter-bar {
            display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;
        }
        .filter-chip {
            padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border-light);
            border-radius: 30px; font-size: 12px; font-weight: 600; color: var(--text-muted);
            white-space: nowrap; cursor: pointer; transition: var(--transition);
        }
        .filter-chip.active { background: var(--primary); color: var(--gold); border-color: var(--gold); }
        .filter-chip i { margin-right: 5px; }

        /* ============================================================
           USER SEARCH BAR
           ============================================================ */
        .search-container {
            margin-bottom: 20px; position: relative;
        }
        .search-input {
            width: 100%; padding: 14px 20px 14px 50px; border-radius: 20px;
            border: 2px solid var(--border-light); background: var(--card-bg);
            font-size: 14px; font-weight: 600; outline: none; transition: var(--transition);
            color: var(--dark);
        }
        .search-input:focus {
            border-color: var(--gold); box-shadow: 0 8px 20px rgba(212,175,55,0.15);
        }
        .search-icon {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: var(--gold); font-size: 18px;
        }

        /* ============================================================
           ORDER CARDS (KEPT SAME AS ORIGINAL BUT THEMED)
           ============================================================ */
        .order-card {
            background: var(--card-bg); border-radius: var(--radius-xl); padding: 22px;
            box-shadow: var(--shadow-md); margin-bottom: 20px;
            border: 1px solid var(--border-light); position: relative; overflow: hidden;
            animation: cardSlideIn 0.4s ease-out backwards;
        }
        @keyframes cardSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .order-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%;
        }
        .order-card.pending::before { background: var(--pending); }
        .order-card.confirmed::before { background: var(--confirm); }
        .order-card.delivered::before { background: var(--deliver); }
        .order-card.rejected::before { background: var(--reject); }

        .ord-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; padding-left: 10px; }
        .ord-meta { display: flex; flex-direction: column; }
        .ord-id { font-size: 12px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px; }
        .ord-status {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px;
            font-weight: 800; text-transform: uppercase; margin-top: 6px;
        }
        .status-pending { background: rgba(251, 191, 36, 0.15); color: var(--pending); }
        .status-confirmed { background: rgba(16, 185, 129, 0.15); color: var(--confirm); }
        .status-delivered { background: rgba(59, 130, 246, 0.15); color: var(--deliver); }
        .status-rejected { background: rgba(239, 68, 68, 0.15); color: var(--reject); }
        .utr-chip {
            background: #F5F1E6; color: var(--dark); padding: 6px 14px; border-radius: 30px;
            font-size: 11px; font-weight: 700; border: 1px solid var(--border-light);
            display: flex; align-items: center; gap: 5px;
        }
        .client-info { background: #FAF4E5; padding: 18px; border-radius: var(--radius-lg); margin-bottom: 18px; }
        .client-info h3 { margin: 0 0 8px 0; font-size: 18px; font-weight: 800; color: var(--dark); display: flex; align-items: center; gap: 8px; }
        .client-info p { margin: 5px 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; display: flex; align-items: center; gap: 8px; }
        .client-info i { width: 18px; color: var(--primary); }
        .items-box { padding: 10px 5px; border-bottom: 1px dashed var(--border-light); margin-bottom: 18px; max-height: 200px; overflow-y: auto; }
        .item-line { display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 10px; padding: 5px 0; }
        .item-line span:first-child { font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .item-line small { color: var(--text-muted); font-size: 12px; }
        .item-line span:last-child { font-weight: 700; color: var(--dark); }
        .total-strip { display: flex; justify-content: space-between; align-items: center; padding-top: 5px; }
        .total-strip span { font-size: 13px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .total-strip b { font-size: 24px; color: var(--dark); font-weight: 800; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 22px; }
        .btn-act {
            border: none; padding: 14px 8px; border-radius: 14px; font-size: 11px;
            font-weight: 800; color: white; cursor: pointer; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 0.5px; display: flex;
            align-items: center; justify-content: center; gap: 5px;
        }
        .btn-act:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-confirm { background: var(--confirm); }
        .btn-deliver { background: var(--deliver); }
        .btn-reject { background: var(--reject); }
        .btn-delete { background: #F5F1E6; color: var(--danger); }

        /* ============================================================
           USER CARDS – WITH PASSWORD DISPLAY
           ============================================================ */
        .user-card {
            background: var(--card-bg); border-radius: var(--radius-lg); padding: 18px;
            display: flex; align-items: center; gap: 16px; margin-bottom: 14px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
            transition: var(--transition);
        }
        .user-card:hover { transform: translateX(5px); box-shadow: var(--shadow-md); }
        .user-card.banned { opacity: 0.6; border-color: var(--danger); }
        .u-img {
            width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-weight: 800; font-size: 22px; flex-shrink: 0;
        }
        .u-data { flex: 1; }
        .u-data h4 { margin: 0 0 5px 0; font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .u-data p { margin: 3px 0; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .password-badge {
            background: rgba(239,68,68,0.1); color: var(--danger); padding: 4px 10px;
            border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-flex;
            align-items: center; gap: 4px; margin-top: 5px;
        }
        .u-stats { display: flex; gap: 15px; margin-top: 8px; }
        .u-stat { text-align: center; }
        .u-stat .value { font-size: 18px; font-weight: 800; color: var(--primary); }
        .u-stat .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .user-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-user {
            border: none; padding: 10px 16px; border-radius: 12px; font-weight: 800;
            font-size: 11px; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 5px;
        }
        .btn-ban { background: #fee2e2; color: var(--danger); }
        .btn-unban { background: #dcfce7; color: var(--confirm); }
        .btn-view { background: #e0e7ff; color: var(--primary); }
        .btn-user:hover { transform: scale(1.02); filter: brightness(0.95); }

        /* ============================================================
           PRODUCTS TABLE
           ============================================================ */
        .products-container { background: var(--card-bg); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md); }
        .product-row { display: flex; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border-light); transition: var(--transition); }
        .product-row:hover { background: #FAF4E5; }
        .product-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #f1f5f9; }
        .product-info { flex: 1; }
        .product-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .product-info p { font-size: 11px; color: var(--text-muted); }
        .product-stats { display: flex; gap: 20px; margin-right: 15px; }
        .product-stat { text-align: center; }
        .product-stat .value { font-weight: 800; font-size: 14px; }
        .product-stat .label { font-size: 10px; color: var(--text-muted); }
        .stock-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; }
        .stock-in { background: #dcfce7; color: var(--confirm); }
        .stock-low { background: #fef9c3; color: #854d0e; }
        .stock-out { background: #fee2e2; color: var(--danger); }

        /* ============================================================
           BOTTOM NAVIGATION
           ============================================================ */
        nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px); display: flex; justify-content: space-around;
            padding: 15px 0 30px; border-top: 1px solid var(--border-light);
            z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }
        .nav-item {
            text-decoration: none; color: var(--text-muted); font-size: 11px;
            font-weight: 700; text-align: center; transition: var(--transition);
            padding: 5px 15px; border-radius: 30px;
        }
        .nav-item.active { color: var(--primary); background: rgba(26, 62, 38, 0.1); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item:hover { color: var(--primary); }

        /* ============================================================
           EMPTY STATES
           ============================================================ */
        .empty-state { text-align: center; padding: 60px 30px; opacity: 0.5; }
        .empty-state i { font-size: 60px; margin-bottom: 20px; color: var(--text-muted); }
        .empty-state h3 { font-size: 18px; margin-bottom: 8px; }
        .empty-state p { font-size: 13px; color: var(--text-muted); }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal {
            position: fixed; inset: 0; background: rgba(10, 31, 19, 0.9);
            backdrop-filter: blur(8px); z-index: 3000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-body {
            background: var(--card-bg); width: 100%; max-width: 500px;
            border-radius: var(--radius-xl); padding: 30px 25px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { font-size: 22px; font-weight: 800; color: var(--dark); }
        .close-modal {
            width: 40px; height: 40px; border-radius: 50%; background: #F5F1E6;
            border: none; cursor: pointer; font-size: 20px; display: flex;
            align-items: center; justify-content: center; color: var(--dark);
        }

        @media (max-width: 480px) {
            .stats-dashboard { grid-template-columns: repeat(2, 1fr); }
            .actions { grid-template-columns: repeat(2, 1fr); }
            .product-stats { display: none; }
        }
    </style>
</head>
<body>

<div id="toastContainer"></div>
<div id="pageLoader">
    <div class="loader-spinner"></div>
    <div class="loader-text">SECURE COMMAND CENTER</div>
</div>

<!-- HEADER -->
<header>
    <div class="logo-box">
        <span>ADMINISTRATION v13.0</span>
        <h1><i class="fas fa-crown" style="color: var(--gold); font-size: 18px;"></i> NEMI COMMAND</h1>
    </div>
    <div class="header-stats">
        <div class="live-stat"><i class="fas fa-shopping-bag"></i> <span id="orderCount">0</span></div>
        <div class="live-stat"><i class="fas fa-rupee-sign"></i> <span id="revenueTotal">0</span></div>
    </div>
</header>

<!-- STATS DASHBOARD -->
<div class="stats-dashboard">
    <div class="stat-card"><div class="stat-icon orders"><i class="fas fa-shopping-cart"></i></div><div class="stat-content"><h3 id="totalOrders">0</h3><p>Total Orders</p></div></div>
    <div class="stat-card"><div class="stat-icon revenue"><i class="fas fa-chart-line"></i></div><div class="stat-content"><h3 id="totalRevenue">₹0</h3><p>Revenue</p></div></div>
    <div class="stat-card"><div class="stat-icon users"><i class="fas fa-users"></i></div><div class="stat-content"><h3 id="totalUsers">0</h3><p>Customers</p></div></div>
    <div class="stat-card"><div class="stat-icon products"><i class="fas fa-box"></i></div><div class="stat-content"><h3 id="totalProducts">0</h3><p>Products</p></div></div>
</div>

<!-- TABS -->
<div class="tab-container">
    <button class="tab-btn active" onclick="switchTab('orders')"><i class="fas fa-clipboard-list"></i> Orders</button>
    <button class="tab-btn" onclick="switchTab('users')"><i class="fas fa-user-circle"></i> Users</button>
    <button class="tab-btn" onclick="switchTab('products')"><i class="fas fa-cube"></i> Products</button>
</div>

<!-- ORDERS SECTION -->
<div id="ordersSection" class="content-section active-section">
    <div class="filter-bar">
        <div class="filter-chip active" onclick="filterOrders('all')"><i class="fas fa-list"></i> All</div>
        <div class="filter-chip" onclick="filterOrders('pending')"><i class="fas fa-clock"></i> Pending</div>
        <div class="filter-chip" onclick="filterOrders('confirmed')"><i class="fas fa-check"></i> Confirmed</div>
        <div class="filter-chip" onclick="filterOrders('delivered')"><i class="fas fa-truck"></i> Delivered</div>
        <div class="filter-chip" onclick="filterOrders('rejected')"><i class="fas fa-times"></i> Rejected</div>
    </div>
    <div id="ordersContainer"></div>
</div>

<!-- USERS SECTION -->
<div id="usersSection" class="content-section">
    <div class="filter-bar">
        <div class="filter-chip active" onclick="filterUsers('all')"><i class="fas fa-users"></i> All</div>
        <div class="filter-chip" onclick="filterUsers('active')"><i class="fas fa-user-check"></i> Active</div>
        <div class="filter-chip" onclick="filterUsers('banned')"><i class="fas fa-user-slash"></i> Banned</div>
    </div>
    <!-- Search Bar -->
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" class="search-input" id="userSearchInput" placeholder="Search by name, phone, username, email..." oninput="searchUsers()">
    </div>
    <div id="usersContainer"></div>
</div>

<!-- PRODUCTS SECTION -->
<div id="productsSection" class="content-section">
    <div class="filter-bar">
        <div class="filter-chip active" onclick="filterProducts('all')"><i class="fas fa-boxes"></i> All</div>
        <div class="filter-chip" onclick="filterProducts('inStock')"><i class="fas fa-check-circle"></i> In Stock</div>
        <div class="filter-chip" onclick="filterProducts('lowStock')"><i class="fas fa-exclamation-triangle"></i> Low Stock</div>
        <div class="filter-chip" onclick="filterProducts('outStock')"><i class="fas fa-times-circle"></i> Out of Stock</div>
    </div>
    <div id="productsContainer"></div>
</div>

<!-- USER DETAILS MODAL -->
<div class="modal" id="userModal">
    <div class="modal-body">
        <div class="modal-header">
            <h2><i class="fas fa-user"></i> User Details</h2>
            <button class="close-modal" onclick="closeModal()">×</button>
        </div>
        <div id="userModalContent"></div>
    </div>
</div>

<!-- BOTTOM NAVIGATION -->
<nav>
    <a href="#" class="nav-item active" onclick="switchTab('orders')"><i class="fas fa-shopping-bag"></i> Orders</a>
    <a href="#" class="nav-item" onclick="switchTab('users')"><i class="fas fa-users"></i> Customers</a>
    <a href="#" class="nav-item" onclick="switchTab('products')"><i class="fas fa-box"></i> Products</a>
  
</nav>

<script>
    // ============================================================
    // FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = { databaseURL: "https://nemi-mart-3-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // ============================================================
    // GLOBAL STATE
    // ============================================================
    let allOrders = [];
    let allUsers = [];
    let allProducts = [];
    let currentFilter = 'all';
    let currentUserFilter = 'all';
    let currentProductFilter = 'all';
    let userSearchTerm = '';
    
    // ============================================================
    // TAB SWITCHING
    // ============================================================
    window.switchTab = function(tab) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tab + 'Section').classList.add('active-section');
        event.target.closest('.tab-btn')?.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.textContent.toLowerCase().includes(tab)) item.classList.add('active');
        });
    };
    
    // ============================================================
    // LOAD ALL DATA
    // ============================================================
    function loadAllData() {
        database.ref('orders').on('value', (snap) => {
            const data = snap.val();
            allOrders = [];
            if (data) {
                Object.keys(data).forEach(key => allOrders.push({ id: key, ...data[key] }));
            }
            allOrders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            updateStats();
            renderOrders();
        });
        
        database.ref('users').on('value', (snap) => {
            const data = snap.val();
            allUsers = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    const userOrders = allOrders.filter(o => o.customer?.phone === data[key].phone || o.uid === key);
                    allUsers.push({ 
                        id: key, 
                        ...data[key], 
                        orderCount: userOrders.length,
                        totalSpent: userOrders.reduce((sum, o) => sum + (o.total || 0), 0)
                    });
                });
            }
            updateStats();
            renderUsers();
        });
        
        database.ref('products').on('value', (snap) => {
            const data = snap.val();
            allProducts = [];
            if (data) {
                Object.keys(data).forEach(key => allProducts.push({ id: key, ...data[key] }));
            }
            updateStats();
            renderProducts();
            document.getElementById('pageLoader').style.opacity = '0';
            setTimeout(() => document.getElementById('pageLoader').style.display = 'none', 500);
        });
    }
    
    // ============================================================
    // UPDATE STATS
    // ============================================================
    function updateStats() {
        document.getElementById('totalOrders').textContent = allOrders.length;
        document.getElementById('orderCount').textContent = allOrders.length;
        document.getElementById('totalUsers').textContent = allUsers.length;
        document.getElementById('totalProducts').textContent = allProducts.length;
        const totalRevenue = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        document.getElementById('totalRevenue').textContent = `₹${totalRevenue.toLocaleString()}`;
        document.getElementById('revenueTotal').textContent = `₹${totalRevenue.toLocaleString()}`;
    }
    
    // ============================================================
    // RENDER ORDERS
    // ============================================================
    function filterOrders(filter) {
        currentFilter = filter;
        document.querySelectorAll('#ordersSection .filter-chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        renderOrders();
    }
    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        let filtered = allOrders;
        if (currentFilter !== 'all') filtered = allOrders.filter(o => (o.status || 'pending').toLowerCase() === currentFilter);
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>No Orders Found</h3></div>`;
            return;
        }
        container.innerHTML = filtered.map((o, i) => {
            const status = o.status || 'pending';
            const items = o.items || [];
            const customer = o.customer || {};
            return `
                <div class="order-card ${status}" style="animation-delay: ${i * 0.05}s">
                    <div class="ord-head">
                        <div class="ord-meta"><span class="ord-id">#${o.id?.slice(-8) || 'N/A'}</span><span class="ord-status status-${status}">${status.toUpperCase()}</span></div>
                        <span class="utr-chip"><i class="fas fa-receipt"></i> UTR: ${o.utr || 'N/A'}</span>
                    </div>
                    <div class="client-info">
                        <h3><i class="fas fa-user"></i> ${customer.name || 'Unknown'}</h3>
                        <p><i class="fas fa-phone"></i> ${customer.phone || 'N/A'}</p>
                        <p><i class="fas fa-envelope"></i> ${customer.email || 'N/A'}</p>
                        <p><i class="fas fa-map-marker-alt"></i> ${customer.address || 'N/A'}</p>
                    </div>
                    <div class="items-box">${items.map(item => `<div class="item-line"><span><i class="fas fa-box"></i> ${item.name || 'Product'} <small>x${item.qty || 1}</small></span><span>₹${(item.price || 0) * (item.qty || 1)}</span></div>`).join('')}</div>
                    <div class="total-strip"><span><i class="fas fa-calculator"></i> TOTAL</span><b>₹${o.total || 0}</b></div>
                    <div class="actions">
                        <button class="btn-act btn-confirm" onclick="updateOrderStatus('${o.id}', 'confirmed')"><i class="fas fa-check"></i> Confirm</button>
                        <button class="btn-act btn-deliver" onclick="updateOrderStatus('${o.id}', 'delivered')"><i class="fas fa-truck"></i> Deliver</button>
                        <button class="btn-act btn-reject" onclick="updateOrderStatus('${o.id}', 'rejected')"><i class="fas fa-times"></i> Reject</button>
                        <button class="btn-act btn-delete" onclick="deleteOrder('${o.id}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `;
        }).join('');
    }
    window.updateOrderStatus = async function(orderId, status) {
        try {
            await database.ref(`orders/${orderId}`).update({ status, updatedAt: Date.now() });
            const order = allOrders.find(o => o.id === orderId);
            if (order && order.customer?.phone) {
                const notifRef = database.ref('notifications').push();
                await notifRef.set({
                    title: `Order ${status.toUpperCase()}!`,
                    message: `Your order #${orderId.slice(-8)} has been ${status}.`,
                    type: 'order_update', orderId, userId: order.uid || order.customer.phone,
                    timestamp: Date.now(), read: false
                });
            }
            showToast(`Order ${status} successfully!`, 'success');
        } catch (error) { showToast('Failed to update order', 'error'); }
    };
    window.deleteOrder = async function(orderId) {
        if (!confirm('Permanently delete this order?')) return;
        try { await database.ref(`orders/${orderId}`).remove(); showToast('Order deleted', 'info'); }
        catch (error) { showToast('Failed to delete', 'error'); }
    };
    
    // ============================================================
    // RENDER USERS (WITH PASSWORD & SEARCH)
    // ============================================================
    window.searchUsers = function() {
        userSearchTerm = document.getElementById('userSearchInput').value.toLowerCase().trim();
        renderUsers();
    };
    
    function filterUsers(filter) {
        currentUserFilter = filter;
        document.querySelectorAll('#usersSection .filter-chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        renderUsers();
    }
    
    function renderUsers() {
        const container = document.getElementById('usersContainer');
        let filtered = allUsers;
        
        // Apply ban filter
        if (currentUserFilter === 'active') filtered = filtered.filter(u => !u.isBanned);
        else if (currentUserFilter === 'banned') filtered = filtered.filter(u => u.isBanned);
        
        // Apply search term
        if (userSearchTerm) {
            filtered = filtered.filter(u => 
                (u.name || '').toLowerCase().includes(userSearchTerm) ||
                (u.phone || '').toLowerCase().includes(userSearchTerm) ||
                (u.username || '').toLowerCase().includes(userSearchTerm) ||
                (u.email || '').toLowerCase().includes(userSearchTerm)
            );
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><h3>No Users Found</h3></div>`;
            return;
        }
        
        container.innerHTML = filtered.map(u => `
            <div class="user-card ${u.isBanned ? 'banned' : ''}">
                <div class="u-img">${u.name?.[0] || 'U'}</div>
                <div class="u-data">
                    <h4>${u.name || 'Unknown'} ${u.isBanned ? '<span style="color:var(--danger);font-size:10px;">(BANNED)</span>' : ''}</h4>
                    <p><i class="fas fa-envelope"></i> ${u.email || 'N/A'}</p>
                    <p><i class="fas fa-phone"></i> ${u.phone || 'N/A'}</p>
                    <p><i class="fas fa-user-tag"></i> @${u.username || 'N/A'}</p>
                    <span class="password-badge"><i class="fas fa-key"></i> Password: ${u.password || 'N/A'}</span>
                    <div class="u-stats">
                        <div class="u-stat"><div class="value">${u.orderCount || 0}</div><div class="label">Orders</div></div>
                        <div class="u-stat"><div class="value">₹${(u.totalSpent || 0).toLocaleString()}</div><div class="label">Spent</div></div>
                    </div>
                </div>
                <div class="user-actions">
                    <button class="btn-user btn-view" onclick="viewUserDetails('${u.id}')"><i class="fas fa-eye"></i> View</button>
                    <button class="btn-user ${u.isBanned ? 'btn-unban' : 'btn-ban'}" onclick="toggleUserBan('${u.id}', ${u.isBanned})">
                        <i class="fas fa-${u.isBanned ? 'unlock' : 'ban'}"></i> ${u.isBanned ? 'Unban' : 'Ban'}
                    </button>
                </div>
            </div>
        `).join('');
    }
    
    window.toggleUserBan = async function(userId, currentStatus) {
        try {
            await database.ref(`users/${userId}`).update({ isBanned: !currentStatus });
            showToast(`User ${!currentStatus ? 'banned' : 'unbanned'}`, 'success');
        } catch (error) { showToast('Failed to update user', 'error'); }
    };
    
    window.viewUserDetails = function(userId) {
        const user = allUsers.find(u => u.id === userId);
        if (!user) return;
        const modal = document.getElementById('userModal');
        const content = document.getElementById('userModalContent');
        const userOrders = allOrders.filter(o => o.customer?.phone === user.phone || o.uid === userId);
        content.innerHTML = `
            <div style="text-align:center;margin-bottom:25px;">
                <div class="u-img" style="margin:0 auto 15px;width:80px;height:80px;font-size:30px;">${user.name?.[0] || 'U'}</div>
                <h3>${user.name || 'Unknown'}</h3>
                <p>${user.email || 'No email'}</p>
                <span class="password-badge" style="margin-top:10px;"><i class="fas fa-key"></i> Password: ${user.password || 'N/A'}</span>
            </div>
            <div style="background:#FAF4E5;padding:20px;border-radius:16px;margin-bottom:20px;">
                <p><i class="fas fa-phone"></i> ${user.phone}</p>
                <p><i class="fas fa-map-marker-alt"></i> ${user.address || 'No address'}</p>
                <p><i class="fas fa-calendar"></i> Joined: ${new Date(user.createdAt || Date.now()).toLocaleDateString()}</p>
                <p><i class="fas fa-user-tag"></i> Username: @${user.username || 'N/A'}</p>
            </div>
            <h4 style="margin-bottom:15px;">Recent Orders (${userOrders.length})</h4>
            ${userOrders.slice(0,5).map(o => `
                <div style="padding:12px;background:white;border-radius:12px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;">
                        <span><strong>#${o.id?.slice(-8)}</strong></span>
                        <span>₹${o.total || 0}</span>
                        <span class="ord-status status-${o.status || 'pending'}">${o.status || 'pending'}</span>
                    </div>
                </div>
            `).join('')}
        `;
        modal.style.display = 'flex';
    };
    
    // ============================================================
    // RENDER PRODUCTS
    // ============================================================
    function filterProducts(filter) {
        currentProductFilter = filter;
        document.querySelectorAll('#productsSection .filter-chip').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        renderProducts();
    }
    function renderProducts() {
        const container = document.getElementById('productsContainer');
        let filtered = allProducts;
        if (currentProductFilter === 'inStock') filtered = allProducts.filter(p => (p.stock || 0) >= 5);
        else if (currentProductFilter === 'lowStock') filtered = allProducts.filter(p => (p.stock || 0) > 0 && (p.stock || 0) < 5);
        else if (currentProductFilter === 'outStock') filtered = allProducts.filter(p => (p.stock || 0) <= 0);
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><h3>No Products Found</h3></div>`;
            return;
        }
        container.innerHTML = `<div class="products-container">${filtered.map(p => {
            const stock = p.stock || 0;
            const stockClass = stock <= 0 ? 'stock-out' : (stock < 5 ? 'stock-low' : 'stock-in');
            const stockText = stock <= 0 ? 'Out' : (stock < 5 ? 'Low' : 'In Stock');
            const image = p.images?.[0] || p.img || 'https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png';
            return `
                <div class="product-row">
                    <img src="${image}" class="product-img" onerror="this.src='https://raw.githubusercontent.com/nemimart/The-Nemi-Mart/main/logo.png'">
                    <div class="product-info"><h4>${p.title || p.name || 'Product'}</h4><p>${p.category || 'General'}</p></div>
                    <div class="product-stats">
                        <div class="product-stat"><div class="value">₹${p.finalPrice || p.price || 0}</div><div class="label">Price</div></div>
                        <div class="product-stat"><div class="value">${p.discount || 0}%</div><div class="label">Discount</div></div>
                    </div>
                    <span class="stock-badge ${stockClass}">${stockText} (${stock})</span>
                </div>
            `;
        }).join('')}</div>`;
    }
    
    function closeModal() { document.getElementById('userModal').style.display = 'none'; }
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${message}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    window.filterOrders = filterOrders;
    window.filterUsers = filterUsers;
    window.filterProducts = filterProducts;
    window.closeModal = closeModal;
    window.searchUsers = searchUsers;
    
    loadAllData();
</script>
</body>
</html>
